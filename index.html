<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍺 0320</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Kaisei+Opti:wght@400;700&display=swap');
:root {
  --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#252540;
  --accent:#ff6b35; --accent2:#ffd166; --teal:#06d6a0;
  --blue:#4895ef; --purple:#a78bfa; --text:#f0eaff; --sub:#9990bb;
  --border:rgba(255,255,255,0.08); --red:#ef476f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Zen Kaku Gothic New',sans-serif;color:var(--text);min-height:100svh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,107,53,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 90%,rgba(72,149,239,.08) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column}
.header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header-title{font-family:'Kaisei Opti',serif;font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.main{flex:1;padding:16px 16px 40px;display:flex;flex-direction:column;gap:16px}
/* 待機 */
.waiting{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 20px;text-align:center}
.waiting-icon{font-size:4rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.waiting-text{font-size:1.1rem;color:var(--sub);line-height:1.7}
.my-num{font-size:3rem;font-weight:900;font-family:'Kaisei Opti',serif;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
/* カード */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.card.teal::before{background:linear-gradient(90deg,var(--teal),var(--blue))}
.card.blue::before{background:linear-gradient(90deg,var(--blue),#a78bfa)}
.card-label{font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.card.teal .card-label{color:var(--teal)}
.card.blue .card-label{color:var(--blue)}
.card-title{font-family:'Kaisei Opti',serif;font-size:1.25rem;font-weight:700;line-height:1.5;margin-bottom:16px}
/* 次へボタン */
.next-btn{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--accent),#e05520);color:white;font-family:'Zen Kaku Gothic New',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:14px;transition:all .2s}
.next-btn:active{transform:scale(.97)}
.next-btn:disabled{opacity:.4;cursor:default;transform:none}
/* 早押し */
.game-area{display:flex;flex-direction:column;align-items:center;gap:20px;padding:10px 0}
.countdown-num{font-size:5rem;font-weight:900;font-family:'Kaisei Opti',serif;line-height:1;transition:all .3s}
.countdown-num.urgent{color:var(--red);animation:urgentPulse .5s ease-in-out infinite alternate}
@keyframes urgentPulse{from{transform:scale(1)}to{transform:scale(1.1)}}
.buzz-hint{font-size:1rem;color:var(--sub);text-align:center;animation:fadeIn .3s ease}
.buzz-btn{width:200px;height:200px;border-radius:50%;border:none;background:radial-gradient(circle at 35% 35%,#ff8c5a,var(--accent),#cc4400);color:white;font-family:'Kaisei Opti',serif;font-size:1.4rem;font-weight:700;cursor:pointer;box-shadow:0 0 0 8px rgba(255,107,53,.15),0 0 0 16px rgba(255,107,53,.07),0 8px 32px rgba(255,107,53,.4);transition:all .15s;-webkit-user-select:none;user-select:none;position:relative;overflow:hidden}
.buzz-btn::before{content:'';position:absolute;top:15%;left:20%;width:30%;height:20%;background:rgba(255,255,255,.25);border-radius:50%;filter:blur(4px)}
.buzz-btn:active{transform:scale(.93)}
.buzz-btn:disabled{background:radial-gradient(circle,#444,#222);box-shadow:none;cursor:default;opacity:.6}
.buzz-btn.winner{background:radial-gradient(circle at 35% 35%,#ffe066,var(--accent2),#cc8800);box-shadow:0 0 0 8px rgba(255,209,102,.2),0 0 40px rgba(255,209,102,.5);animation:winnerPulse .6s ease}
.buzz-btn.loser{background:radial-gradient(circle,#333,#1a1a1a);box-shadow:none}
@keyframes winnerPulse{0%{transform:scale(1)}30%{transform:scale(1.12)}60%{transform:scale(.97)}100%{transform:scale(1)}}
.result-banner{width:100%;padding:16px;border-radius:16px;text-align:center;font-size:1.2rem;font-weight:900;font-family:'Kaisei Opti',serif;animation:bannerIn .4s cubic-bezier(.175,.885,.32,1.275)}
.result-banner.win{background:linear-gradient(135deg,rgba(255,209,102,.2),rgba(6,214,160,.2));border:2px solid var(--accent2);color:var(--accent2)}
.result-banner.lose{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--sub)}
.result-banner.last{background:rgba(239,71,111,.1);border:2px solid var(--red);color:var(--red)}
@keyframes bannerIn{from{transform:scale(.8) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.odai-box{width:100%;padding:16px;border-radius:16px;background:rgba(255,209,102,.08);border:1.5px solid rgba(255,209,102,.3);text-align:center}
.odai-label{font-size:.7rem;color:var(--accent2);letter-spacing:.15em;margin-bottom:8px;font-weight:700}
.odai-text{font-size:1.1rem;font-weight:700;line-height:1.5}
/* カードゲーム */
.play-cards{display:flex;gap:10px;justify-content:center;margin-top:12px}
.play-card{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:16px;border:2.5px solid;cursor:pointer;padding:16px 8px;gap:6px;transition:transform .15s,box-shadow .15s;background:var(--surface2);flex:1;min-height:156px}
.play-card:active{transform:scale(.93) translateY(-4px)}
.play-card-icon{font-size:2.6rem}
.play-card-name{font-size:.9rem;font-weight:900}
.play-card-rule{font-size:.62rem;color:var(--sub);text-align:center;line-height:1.5}
.result-cards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.result-card{display:flex;flex-direction:column;align-items:center;border-radius:14px;border:2px solid;padding:12px 6px;gap:3px;min-width:72px;max-width:90px;position:relative}
.result-card.me{box-shadow:0 0 0 2px var(--accent2)}
.result-card-num{font-size:.65rem;color:var(--sub)}
.result-card-icon{font-size:2rem}
.result-card-name{font-size:.7rem;font-weight:700}
.result-card-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:2px}
/* お絵かき */
.draw-wrap{width:100%;aspect-ratio:4/3;border-radius:16px;overflow:hidden;background:#fff;touch-action:none}
#drawCanvas{width:100%;height:100%;display:block}
/* アドベンチャー */
.adv-maze{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;border-radius:10px;overflow:hidden;background:var(--surface2);padding:2px;margin:8px 0}
.adv-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:.9rem;border-radius:3px}
.adv-cell.wall{background:#0d0d1a}
.adv-cell.floor{background:#252545}
.adv-cell.player{background:rgba(72,149,239,.4)}
.adv-cell.enemy-cell{background:rgba(239,71,111,.25)}
.adv-dpad{display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);gap:4px;margin:6px auto;width:fit-content}
.adv-dpad-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;color:var(--text);width:52px;height:52px;border:none}
.adv-dpad-btn:active{transform:scale(.88);background:var(--surface)}
.adv-inv{display:flex;gap:8px;margin:6px 0;flex-wrap:wrap}
.adv-inv-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:.8rem}
.adv-events{background:var(--surface2);border-radius:10px;padding:8px 10px;max-height:110px;overflow-y:auto;margin-top:6px}
.adv-event{font-size:.72rem;color:var(--sub);padding:2px 0;line-height:1.5;border-bottom:1px solid var(--border)}
.adv-event:last-child{border-bottom:none}
.adv-hpbar{height:8px;background:var(--surface2);border-radius:100px;overflow:hidden;flex:1}
.adv-hpfill{height:100%;background:linear-gradient(90deg,var(--red),var(--accent));border-radius:100px;transition:width .3s}
/* ユーティリティ */
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.cf{position:absolute;width:8px;height:8px;opacity:0;animation:cfFall var(--d) ease-in var(--dl) forwards}
@keyframes cfFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-title">🍺 0320</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:.72rem;color:var(--sub)" id="headerSub">接続中...</span>
      <div class="status-dot"></div>
    </div>
  </header>
  <main class="main" id="mainContent"></main>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="config.js"></script>
<script>

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

// ============================================================
// 状態
// ============================================================
const myId = 'c_' + Math.random().toString(36).slice(2, 9);
let myNum      = null;   // 参加者番号（1始まり）
let currentMode = 'idle';
let myBuzzed   = false;
let buzzTimerInterval = null;
let buzzCountdown = 0;
let participantCount = 0;
let lastGRound = 0;
let lastAruRound = 0;
let myAruVote = null;
let lastCardRound     = 0;
let myCardVote        = null;
let rulesAcknowledged = false;
let initialModeLoaded = false;
let drawState     = {};
let amIDrawer     = false;
let allStrokes    = {};
let lastDrawRound = 0;
let liveFlushTimer = null;
// アドベンチャー
let advState      = {};
let myRow = 0, myCol = 0;
let myHP  = 3;
let myAdvAlive    = true;
let myItems       = { attack:0, heal:0, defense:0 };
let myPickedItems = {};
let myDefBuff     = 0;

// ============================================================
// プレゼンス（参加者番号割り当て）
// ============================================================
const presRef = db.ref('presence/' + myId);
presRef.set({ joined: firebase.database.ServerValue.TIMESTAMP });
presRef.onDisconnect().remove();

// 自分の番号を取得（presenceの並び順で決定）
db.ref('presence').on('value', snap => {
  if (!snap.exists()) return;
  const keys = Object.keys(snap.val()).sort();
  const idx  = keys.indexOf(myId);
  myNum = idx >= 0 ? idx + 1 : null;
  const total = keys.length;
  participantCount = total;
  document.getElementById('headerSub').textContent =
    myNum ? `参加者 ${myNum}番 / ${total}人` : `${total}人参加中`;
  if (currentMode === 'idle') render();
});

// ============================================================
// モード監視（メイン）
// ============================================================
db.ref('mode').on('value', snap => {
  const mode = snap.val() || 'idle';
  if (mode === 'end') {
    if (initialModeLoaded) {
      // セッション中にendになった場合のみリダイレクト（再アクセス時はスキップ）
      window.location.href = 'end.html';
    } else {
      initialModeLoaded = true;
      currentMode = 'idle';
      render();
    }
    return;
  }
  initialModeLoaded = true;
  if (mode !== currentMode) {
    currentMode = mode;
    // モード切替時に個人状態リセット
    myBuzzed  = false;
    myAruVote = null;
    myCardVote        = null;
    rulesAcknowledged = false;
    amIDrawer  = false;
    allStrokes = {};
    if (liveFlushTimer) { clearInterval(liveFlushTimer); liveFlushTimer = null; }
    if (buzzTimerInterval) { clearInterval(buzzTimerInterval); buzzTimerInterval = null; }
    myRow = 0; myCol = 0; myHP = 3; myAdvAlive = true;
    myItems = { attack:0, heal:0, defense:0 }; myPickedItems = {}; myDefBuff = 0;
  }
  render();
});

// ============================================================
// 各データ監視
// ============================================================
let gState  = {};
db.ref('game').on('value', snap => {
  gState = snap.val() || {};
  // ラウンドが変わったら早押し状態をリセット
  if (gState.round && gState.status === 'countdown' && gState.round !== lastGRound) {
    lastGRound = gState.round;
    myBuzzed = false;
  }
  if (currentMode === 'game') renderGame();
});
let aruState = {};
db.ref('aruana').on('value', snap => {
  aruState = snap.val() || {};
  if (aruState.round && aruState.round !== lastAruRound) {
    lastAruRound = aruState.round;
    myAruVote = null;
  }
  if (currentMode === 'aruana') render();
});

let cardState = {};
db.ref('cardgame').on('value', snap => {
  cardState = snap.val() || {};
  if (cardState.round && cardState.round !== lastCardRound && !cardState.results) {
    lastCardRound = cardState.round;
    myCardVote = null;
  }
  if (currentMode === 'cardgame') render();
});

db.ref('drawing').on('value', snap => {
  const newState   = snap.val() || {};
  const prevStatus = drawState.status;
  const roundChanged = newState.round && newState.round !== lastDrawRound;
  if (roundChanged) { lastDrawRound = newState.round; allStrokes = {}; }
  if (newState.strokes) allStrokes = { ...newState.strokes };
  drawState = newState;
  const newAmIDrawer = newState.drawerId === myId;
  if (currentMode !== 'drawing') { amIDrawer = newAmIDrawer; return; }
  const statusChanged  = prevStatus !== newState.status;
  const drawerChanged  = newAmIDrawer !== amIDrawer;
  amIDrawer = newAmIDrawer;
  if (roundChanged || statusChanged || drawerChanged || !document.getElementById('drawCanvas')) {
    render();
  } else if (!amIDrawer) {
    redrawCanvas();
  }
});

db.ref('adventure').on('value', snap => {
  advState = snap.val() || {};
  if (currentMode === 'adventure') renderAdventure();
});

// ============================================================
// メイン描画
// ============================================================
function render() {
  if      (currentMode === 'idle')     renderIdle();
  else if (currentMode === 'game')     renderGame();
  else if (currentMode === 'aruana')   renderAruana();
  else if (currentMode === 'cardgame')  renderCard();
  else if (currentMode === 'drawing')   renderDraw();
  else if (currentMode === 'adventure') renderAdventure();
}

// ===== 待機 =====
function renderIdle() {
  document.getElementById('mainContent').innerHTML = `
    <div class="waiting fade-in">
      <div class="waiting-icon">🍺</div>
      ${myNum ? `<div style="font-size:.85rem;color:var(--sub)">あなたの番号</div><div class="my-num">${myNum}</div>` : ''}
      <div style="display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:8px 20px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pulse 2s ease-in-out infinite"></div>
        <span style="font-size:.9rem;color:var(--teal);font-weight:700">${participantCount}人 参加中</span>
      </div>
      <div class="waiting-text">ホストがモードを<br>選ぶまで待ってね！</div>
    </div>`;
}

// ===== ゲーム =====
function renderGame() {
  const g  = gState;
  const el = document.getElementById('mainContent');
  if (!g || !g.status) {
    el.innerHTML = `<div class="waiting fade-in"><div class="waiting-icon">🎮</div><div class="waiting-text">ゲームを読み込み中...</div></div>`;
    return;
  }

  if (g.status === 'countdown') {
    renderBuzzCountdown(el, g);
  } else if (g.status === 'ready') {
    renderBuzzReady(el, g);
  } else if (g.status === 'done') {
    renderBuzzDone(el, g);
  } else {
    el.innerHTML = `<div class="waiting fade-in"><div class="waiting-icon">🎮</div><div class="waiting-text">ホストがゲームを<br>開始します！</div></div>`;
  }
}

function renderBuzzCountdown(el, g) {
  const serverStart = g.countdownStart || Date.now();
  const elapsed     = Math.floor((Date.now() - serverStart) / 1000);
  let   remaining   = Math.max(0, 10 - elapsed);

  const urgent = remaining <= 3;
  el.innerHTML = `
    <div class="card teal fade-in">
      <div class="card-label">🔴 早押しゲーム (${g.round || 1}/2回目)</div>
      <div style="text-align:center;font-size:.8rem;color:var(--sub);margin-bottom:4px">あなたは <span style="color:var(--accent2);font-weight:900;font-size:1.1rem">${myNum || '?'}番</span></div>
      <div class="game-area">
        <div class="buzz-hint">10秒過ぎたら「押せ！」の合図！</div>
        <div class="countdown-num ${urgent?'urgent':''}" id="cdNum">${remaining}</div>
        <button class="buzz-btn" disabled>待機中...</button>
      </div>
    </div>`;

  if (buzzTimerInterval) clearInterval(buzzTimerInterval);
  buzzTimerInterval = setInterval(() => {
    const el2 = document.getElementById('cdNum');
    if (!el2) { clearInterval(buzzTimerInterval); return; }
    const e2  = Math.floor((Date.now() - serverStart) / 1000);
    const r2  = Math.max(0, 10 - e2);
    el2.textContent = r2;
    el2.className   = 'countdown-num' + (r2 <= 3 ? ' urgent' : '');
    if (r2 <= 0) { clearInterval(buzzTimerInterval); buzzTimerInterval = null; }
  }, 200);
}

function renderBuzzReady(el, g) {
  if (buzzTimerInterval) { clearInterval(buzzTimerInterval); buzzTimerInterval = null; }
  el.innerHTML = `
    <div class="card teal fade-in">
      <div class="card-label">🔴 早押しゲーム (${g.round || 1}/2回目)</div>
      <div style="text-align:center;font-size:.8rem;color:var(--sub);margin-bottom:4px">あなたは <span style="color:var(--accent2);font-weight:900;font-size:1.1rem">${myNum || '?'}番</span></div>
      <div class="game-area">
        ${myBuzzed ? `
          <div class="buzz-hint" style="color:var(--teal);font-size:1.2rem;font-weight:700">✅ 押した！結果待ち…</div>
          <button class="buzz-btn" disabled>押した！</button>
        ` : `
          <div class="buzz-hint" style="color:var(--accent);font-size:1.2rem;font-weight:700">今すぐ押せ！！🔥</div>
          <button class="buzz-btn" id="buzzBtn" onclick="doBuzz()">押す！</button>
        `}
      </div>
    </div>`;
}

function renderBuzzDone(el, g) {
  if (buzzTimerInterval) { clearInterval(buzzTimerInterval); buzzTimerInterval = null; }
  const results   = g.results || {};
  const sorted    = Object.entries(results).sort((a,b) => a[1].ts - b[1].ts);
  const winnerId  = sorted[0]  ? sorted[0][0]  : null;
  const loserId   = sorted[sorted.length-1] ? sorted[sorted.length-1][0] : null;
  const isWinner  = myId === winnerId;
  const isLast    = myId === loserId && sorted.length > 1;
  const odai      = g.odai || '';
  const winnerNum = getNumFromResults(winnerId, g);

  el.innerHTML = `
    <div class="card teal fade-in">
      <div class="card-label">🔴 早押しゲーム 結果</div>
      <div class="game-area">
        <button class="buzz-btn ${isWinner?'winner':isLast?'loser':''}" disabled>
          ${isWinner?'🏆':isLast?'😢':'👍'}
        </button>
        <div class="result-banner ${isWinner?'win':isLast?'last':'lose'}">
          ${isWinner ? `🎉 ${myNum}番・あなたが一番乗り！` : isLast ? '😭 一番遅かった…！' : '惜しかった！'}
        </div>
        ${isLast && odai ? `
          <div class="odai-box">
            <div class="odai-label">📋 お題</div>
            <div class="odai-text">${winnerNum}番さんが勝利！<br>「${odai}」</div>
          </div>` : ''}
        ${isWinner ? `<div class="odai-box"><div class="odai-label">📋</div><div class="odai-text">最後の人からメッセージが届くよ！</div></div>` : ''}
      </div>
    </div>`;
  if (isWinner) launchConfetti();
}

function getNumFromResults(id, g) {
  if (!id) return '?';
  const results = g.results || {};
  return results[id] ? results[id].num : '?';
}

window.doBuzz = function() {
  if (myBuzzed) return;
  if (gState.status !== 'ready') return;
  myBuzzed = true;
  const btn = document.getElementById('buzzBtn');
  if (btn) btn.disabled = true;

function setupCanvas() {
  const canvas = document.getElementById('drawCanvas');
  if (!canvas) return;
  const wrap = document.getElementById('drawWrap');
  canvas.width  = wrap.clientWidth  || 300;
  canvas.height = wrap.clientHeight || 225;
  redrawCanvas();
  if (amIDrawer && drawState.status === 'drawing') attachDrawEvents(canvas);
}

function redrawCanvas() {
  const canvas = document.getElementById('drawCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const key of Object.keys(allStrokes).sort()) {
    paintStroke(ctx, allStrokes[key], canvas.width, canvas.height);
  }
  // ライブストローク（描いてる途中）をviewerに表示
  if (!amIDrawer && drawState.live) {
    paintStroke(ctx, drawState.live, canvas.width, canvas.height);
  }
}

function paintStroke(ctx, pts, w, h) {
  if (!pts || typeof pts !== 'string') return;
  const nums = pts.split(',').map(Number);
  if (nums.length < 4) return;
  ctx.beginPath();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth   = Math.max(3, w * 0.012);
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.moveTo(nums[0] * w, nums[1] * h);
  for (let i = 2; i < nums.length - 1; i += 2) {
    ctx.lineTo(nums[i] * w, nums[i + 1] * h);
  }
  ctx.stroke();
}

function attachDrawEvents(canvas) {
  const w = canvas.width;
  const h = canvas.height;
  let drawing = false;
  let pts = [];

  function getPos(e) {
    const rect  = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return [(touch.clientX - rect.left) / rect.width,
            (touch.clientY - rect.top)  / rect.height];
  }

  function onStart(e) {
    e.preventDefault();
    drawing = true; pts = [];
    const [x, y] = getPos(e);
    pts.push(x, y);
  }

  function onMove(e) {
    e.preventDefault();
    if (!drawing) return;
    const [x, y] = getPos(e);
    pts.push(x, y);
    if (pts.length >= 4) {
      const ctx2 = canvas.getContext('2d');
      ctx2.beginPath();
      ctx2.strokeStyle = '#1a1a1a';
      ctx2.lineWidth   = Math.max(3, w * 0.012);
      ctx2.lineCap     = 'round';
      ctx2.lineJoin    = 'round';
      ctx2.moveTo(pts[pts.length - 4] * w, pts[pts.length - 3] * h);
      ctx2.lineTo(pts[pts.length - 2] * w, pts[pts.length - 1] * h);
      ctx2.stroke();
    }
  }

  function onEnd(e) {
    if (!drawing) return;
    drawing = false;
    if (pts.length >= 4) {
      const s = pts.map(n => Math.round(n * 1000) / 1000).join(',');
      db.ref('drawing/strokes').push(s);
    }
    db.ref('drawing/live').set(null);
    pts = [];
  }

  // 0.3秒ごとに描いてる途中のストロークをFirebaseに送信
  if (liveFlushTimer) clearInterval(liveFlushTimer);
  liveFlushTimer = setInterval(() => {
    if (drawing && pts.length >= 4) {
      db.ref('drawing/live').set(pts.map(n => Math.round(n * 1000) / 1000).join(','));
    }
  }, 300);

  canvas.addEventListener('mousedown',  onStart);
  canvas.addEventListener('mousemove',  onMove);
  canvas.addEventListener('mouseup',    onEnd);
  canvas.addEventListener('mouseleave', onEnd);
  canvas.addEventListener('touchstart', onStart, { passive: false });
  canvas.addEventListener('touchmove',  onMove,  { passive: false });
  canvas.addEventListener('touchend',   onEnd);
}

window.clearDrawCanvas = function() {
  db.ref('drawing/strokes').set({});
  allStrokes = {};
  redrawCanvas();
};

  if (evEl) evEl.scrollTop = evEl.scrollHeight;
}

function buildMazeHTML() {
  let html = '';
  for (let r=0;r<6;r++) {
    for (let c=0;c<6;c++) {
      const isWall   = ADV_MAZE[r][c] === 1;
      const isMe     = r===myRow && c===myCol;
      const isEnemy  = r===5 && c===5;
      const key      = `${r}_${c}`;
      const hasItem  = ADV_ITEMS_DEF[key] && !myPickedItems[key];
      let cls='adv-cell ', content='';
      if (isWall)        { cls+='wall'; }
      else if (isMe)     { cls+='player'; content=myAdvAlive?'😊':'💀'; }
      else if (isEnemy)  { cls+='enemy-cell'; content='👹'; }
      else if (hasItem)  { cls+='floor'; content=ADV_ITEM_EMOJI[ADV_ITEMS_DEF[key]]; }
      else               { cls+='floor'; }
      html += `<div class="${cls}">${content}</div>`;
    }
  }
  return html;
}

function renderAdvResult(el, a) {
  const compat  = a.compat || {};
  const pairs   = a.pairs  || {};
  const myComp  = compat[myId];
  const pairHtml = Object.values(pairs).sort((x,y)=>y.score-x.score).map(p =>
    `<div style="background:var(--surface2);border-radius:12px;padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-weight:700">${p.nums[0]}番 × ${p.nums[1]}番</span>
        <span style="color:var(--accent2);font-weight:900;font-size:1.1rem">${p.score}%</span>
      </div>
      <div style="font-size:.82rem;color:var(--sub)">${p.comment}</div>
    </div>`).join('');
  el.innerHTML = `
    <div class="card fade-in">
      <div class="card-label" style="color:var(--purple)">🗡️ アドベンチャー相性診断</div>
      ${myComp?`<div style="text-align:center;margin:12px 0;padding:16px;background:rgba(167,139,250,.1);border-radius:14px;border:1px solid rgba(167,139,250,.3)">
        <div style="font-size:.7rem;color:var(--purple);margin-bottom:6px">あなたのタイプ</div>
        <div style="font-size:1.1rem;font-weight:700">${myComp.label}</div>
      </div>`:''}
      <div style="font-size:.72rem;color:var(--sub);margin-bottom:8px;letter-spacing:.1em">相性ランキング</div>
      ${pairHtml}
    </div>`;
  launchConfetti();
}

window.advMove = function(dr, dc) {
  if (!myAdvAlive || advState.status !== 'playing') return;
  const nr = myRow+dr, nc = myCol+dc;
  if (nr<0||nr>=6||nc<0||nc>=6||ADV_MAZE[nr][nc]===1) return;
  myRow=nr; myCol=nc;
  const key=`${nr}_${nc}`;
  if (ADV_ITEMS_DEF[key] && !myPickedItems[key]) {
    myPickedItems[key]=true;
    const type=ADV_ITEMS_DEF[key];
    myItems[type]++;
    addAdvEvent(`${myNum}番さんが${ADV_ITEM_EMOJI[type]}を手に入れた！`);
  }
  db.ref(`adventure/players/${myId}`).update({ row:myRow, col:myCol, items:myItems });
  renderAdventure();
};

window.advAttack = function(isPower) {
  if (!myAdvAlive || advState.status!=='playing') return;
  if (myRow!==5 || myCol!==5) return;
  if (isPower && myItems.attack<=0) return;
  const dmg  = isPower ? 2 : 1;
  const risk = isPower ? 0.5 : 0.25;
  if (isPower) myItems.attack--;
  db.ref(`adventure/players/${myId}/stats/attacked`).transaction(v=>(v||0)+1);
  db.ref(`adventure/players/${myId}/items`).set(myItems);
  addAdvEvent(`${myNum}番さんが${isPower?'💥必殺技':'⚔️通常攻撃'}！→ 敵に${dmg}ダメージ！`);
  db.ref('adventure/enemyHP').transaction(hp => {
    if (hp===null||hp<=0) return undefined;
    return Math.max(0, hp-dmg);
  }, (err, committed, snap) => {
    if (!err && committed) {
      if ((snap.val()||0) <= 0) {
        db.ref('adventure/status').set('victory');
        addAdvEvent('🎉 敵のHPが0になった！みんなの勝利！');
      }
      // カウンター判定
      if (Math.random() < risk) {
        if (myDefBuff > 0) {
          myDefBuff--;
          addAdvEvent(`👹 敵の反撃！ → ${myNum}番さんの🛡️が発動！ダメージ無効！`);
        } else {
          myHP = Math.max(0, myHP-1);
          db.ref(`adventure/players/${myId}`).update({ hp:myHP, alive:myHP>0 });
          if (myHP <= 0) {
            myAdvAlive = false;
            addAdvEvent(`👹 敵の反撃！ → ${myNum}番さんがやられた！💀`);
            checkAllDefeated();
          } else if (myHP === 1) {
            addAdvEvent(`👹 敵の反撃！ → ${myNum}番さんがピンチ！❤️残り1！`);
          } else {
            addAdvEvent(`👹 敵の反撃！ → ${myNum}番さんに1ダメージ！`);
          }
        }
      }
    }
    renderAdventure();
  });
  renderAdventure();
};

window.advUseHeal = function() {
  if (!myAdvAlive||myItems.heal<=0) return;
  myItems.heal--;
  myHP=Math.min(3,myHP+1);
  db.ref(`adventure/players/${myId}`).update({ hp:myHP, items:myItems });
  db.ref(`adventure/players/${myId}/stats/healed`).transaction(v=>(v||0)+1);
  addAdvEvent(`${myNum}番さんが💊を使った！HP回復！(残り❤️${myHP})`);
  renderAdventure();
};

window.advUseDefense = function() {
  if (!myAdvAlive||myItems.defense<=0||myDefBuff>0) return;
  myItems.defense--;
  myDefBuff=3;
  db.ref(`adventure/players/${myId}`).update({ items:myItems });
  db.ref(`adventure/players/${myId}/stats/defended`).transaction(v=>(v||0)+1);
  addAdvEvent(`${myNum}番さんが🛡️を使った！次の反撃をガード！`);
  renderAdventure();
};

function checkAllDefeated() {
  db.ref('adventure/players').once('value', snap => {
    const ps = snap.val() || {};
    if (Object.values(ps).every(p => !p.alive)) {
      db.ref('adventure/status').set('defeat');
      addAdvEvent('😭 全員やられた... ゲームオーバー！');
    }
  });
}

function addAdvEvent(text) {
  db.ref('adventure/events').push({ text, ts: firebase.database.ServerValue.TIMESTAMP });
}

// ============================================================
// ユーティリティ
// ============================================================
function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const cols = ['#ff6b35','#ffd166','#06d6a0','#4895ef','#ff9ff3','#fff'];
  wrap.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div'); el.className = 'cf';
    el.style.cssText = `left:${Math.random()*100}%;top:-10px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'3px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;--d:${1.2+Math.random()*1.2}s;--dl:${Math.random()*.4}s`;
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 2500);
}
</script>

</html>
