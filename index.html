<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍺 のみかい</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Kaisei+Opti:wght@400;700&display=swap');

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252540;
  --accent: #ff6b35;
  --accent2: #ffd166;
  --teal: #06d6a0;
  --blue: #4895ef;
  --text: #f0eaff;
  --sub: #9990bb;
  --border: rgba(255,255,255,0.08);
  --red: #ef476f;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--text);
  min-height: 100svh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,107,53,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 90%, rgba(72,149,239,0.08) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
}

/* ヘッダー */
.header {
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.header-title {
  font-family: 'Kaisei Opti', serif;
  font-size: 1.3rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px var(--teal);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* メインコンテンツ */
.main {
  flex: 1;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-bottom: 100px;
  padding-top: 16px;
}

/* 待機画面 */
.waiting {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px 20px;
  text-align: center;
}
.waiting-icon {
  font-size: 4rem;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.waiting-text {
  font-size: 1.1rem;
  color: var(--sub);
  line-height: 1.7;
}

/* セクションカード */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
.card.teal::before { background: linear-gradient(90deg, var(--teal), var(--blue)); }
.card.blue::before  { background: linear-gradient(90deg, var(--blue), #a78bfa); }

.card-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.card.teal .card-label { color: var(--teal); }
.card.blue  .card-label { color: var(--blue); }

.card-title {
  font-family: 'Kaisei Opti', serif;
  font-size: 1.3rem;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 16px;
}

/* 選択肢ボタン */
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice-btn {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}
.choice-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: rgba(255,107,53,0.15);
  transition: width 0.5s ease;
}
.choice-btn.voted::before { width: var(--pct); }
.choice-btn:active:not(:disabled) { transform: scale(0.98); }
.choice-btn.selected {
  border-color: var(--accent);
  background: rgba(255,107,53,0.15);
}
.choice-btn:disabled { cursor: default; }

.choice-text { position: relative; z-index: 1; flex: 1; }
.choice-meta {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 60px;
  justify-content: flex-end;
}
.choice-count {
  font-size: 0.85rem;
  color: var(--sub);
  font-weight: 400;
}
.choice-pct {
  font-size: 0.85rem;
  color: var(--accent2);
  font-weight: 700;
  min-width: 36px;
  text-align: right;
}
.choice-check { color: var(--accent); font-size: 1rem; }

/* 早押しゲーム */
.game-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.game-status {
  font-size: 0.85rem;
  color: var(--sub);
  text-align: center;
}

.buzz-btn {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: none;
  background: radial-gradient(circle at 35% 35%, #ff8c5a, var(--accent), #cc4400);
  color: white;
  font-family: 'Kaisei Opti', serif;
  font-size: 1.4rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow:
    0 0 0 8px rgba(255,107,53,0.15),
    0 0 0 16px rgba(255,107,53,0.07),
    0 8px 32px rgba(255,107,53,0.4);
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}
.buzz-btn::before {
  content: '';
  position: absolute;
  top: 15%; left: 20%;
  width: 30%; height: 20%;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  filter: blur(4px);
}
.buzz-btn:active { transform: scale(0.93); box-shadow: 0 0 0 4px rgba(255,107,53,0.2), 0 4px 16px rgba(255,107,53,0.3); }
.buzz-btn:disabled { background: radial-gradient(circle, #444, #222); box-shadow: none; cursor: default; opacity: 0.6; }
.buzz-btn.winner {
  background: radial-gradient(circle at 35% 35%, #ffe066, var(--accent2), #cc8800);
  box-shadow: 0 0 0 8px rgba(255,209,102,0.2), 0 0 40px rgba(255,209,102,0.5);
  animation: winnerPulse 0.6s ease;
}
.buzz-btn.loser {
  background: radial-gradient(circle, #333, #1a1a1a);
  box-shadow: none;
}
@keyframes winnerPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.12); }
  60% { transform: scale(0.97); }
  100% { transform: scale(1); }
}

.result-banner {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  text-align: center;
  font-size: 1.3rem;
  font-weight: 900;
  font-family: 'Kaisei Opti', serif;
  animation: bannerIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.result-banner.win {
  background: linear-gradient(135deg, rgba(255,209,102,0.2), rgba(6,214,160,0.2));
  border: 2px solid var(--accent2);
  color: var(--accent2);
}
.result-banner.lose {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--sub);
}
@keyframes bannerIn {
  from { transform: scale(0.8) translateY(10px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

/* タイミングゲーム */
.timing-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.timing-target {
  font-size: 0.8rem;
  color: var(--sub);
  text-align: center;
}
.timing-bar-wrap {
  width: 100%;
  height: 20px;
  background: var(--surface2);
  border-radius: 100px;
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
}
.timing-bar {
  height: 100%;
  width: 4px;
  background: linear-gradient(90deg, var(--teal), var(--accent2));
  border-radius: 100px;
  position: absolute;
  left: 0;
  box-shadow: 0 0 8px var(--teal);
  transition: none;
}
.timing-zone {
  position: absolute;
  top: 0; bottom: 0;
  background: rgba(6,214,160,0.25);
  border-left: 2px solid var(--teal);
  border-right: 2px solid var(--teal);
}
.timing-tap-btn {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: none;
  background: radial-gradient(circle at 35% 35%, #08f5be, var(--teal), #047a60);
  color: white;
  font-family: 'Kaisei Opti', serif;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 0 0 8px rgba(6,214,160,0.15), 0 8px 24px rgba(6,214,160,0.3);
  transition: all 0.15s;
}
.timing-tap-btn:active { transform: scale(0.92); }
.timing-tap-btn:disabled { background: radial-gradient(circle, #444, #222); box-shadow: none; cursor: default; }
.timing-score {
  font-size: 0.9rem;
  color: var(--sub);
  text-align: center;
}

/* 匿名メッセージ */
.msg-input-area {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.msg-textarea {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 0.95rem;
  resize: none;
  min-height: 52px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
}
.msg-textarea:focus { border-color: var(--blue); }
.msg-textarea::placeholder { color: var(--sub); }
.msg-send-btn {
  width: 52px; height: 52px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, var(--blue), #6c63ff);
  color: white;
  font-size: 1.3rem;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.msg-send-btn:active { transform: scale(0.92); }
.msg-send-btn:disabled { opacity: 0.4; cursor: default; }

.msg-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
  max-height: 320px;
  overflow-y: auto;
}
.msg-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 0.95rem;
  line-height: 1.6;
  animation: msgIn 0.3s ease;
  position: relative;
}
.msg-item::before {
  content: '💬';
  font-size: 0.75rem;
  margin-right: 6px;
  opacity: 0.5;
}
.msg-time {
  font-size: 0.7rem;
  color: var(--sub);
  margin-top: 4px;
}
@keyframes msgIn {
  from { transform: translateX(-8px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

/* ボトムナビ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(15,15,26,0.9);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--sub);
  transition: color 0.2s;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}
.nav-item.active { color: var(--accent); }
.nav-item .nav-icon { font-size: 1.4rem; }
.nav-item .nav-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; }

/* ユーティリティ */
.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* confetti */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}
.cf {
  position: absolute;
  width: 8px; height: 8px;
  opacity: 0;
  animation: cfFall var(--d) ease-in var(--dl) forwards;
}
@keyframes cfFall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.5); }
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-title">🍺 のみかい</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:0.72rem;color:var(--sub)" id="participantCount">接続中...</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </header>

  <main class="main" id="mainContent">
    <!-- JS で描画 -->
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="question" onclick="switchTab('question',this)">
      <span class="nav-icon">❓</span>
      <span class="nav-label">質問</span>
    </button>
    <button class="nav-item" data-tab="game" onclick="switchTab('game',this)">
      <span class="nav-icon">🎮</span>
      <span class="nav-label">ゲーム</span>
    </button>
    <button class="nav-item" data-tab="message" onclick="switchTab('message',this)">
      <span class="nav-icon">💬</span>
      <span class="nav-label">メッセージ</span>
    </button>
  </nav>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, get, serverTimestamp, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ============================================================
// 🔧 設定（firebase-config.js の内容をここに貼り付けてください）
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyDvSq393Gr4jee-DJRRf4JQxN5B8iXy4Fk",
  authDomain: "nomikai-50206.firebaseapp.com",
  databaseURL: "https://nomikai-50206-default-rtdb.firebaseio.com",
  projectId: "nomikai-50206",
  storageBucket: "nomikai-50206.firebasestorage.app",
  messagingSenderId: "779735081390",
  appId: "1:779735081390:web:04a6d90b4576e92d1e683f"
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getDatabase(app);

// ============================================================
// 状態
// ============================================================
let currentTab  = 'question';
let myClientId  = 'client_' + Math.random().toString(36).slice(2, 9);
let myVote      = null;   // 質問の自分の回答
let myBuzzed    = false;  // 早押し済みフラグ
let myTimed     = false;  // タイミング済みフラグ
let gameState   = {};     // ゲーム最新状態
let questionState = {};
let messages    = [];
let timingRAF   = null;
let timingPos   = 0;
let timingDir   = 1;

// ============================================================
// Firebase リスナー
// ============================================================

// 参加者カウント（接続管理）
const myPresenceRef = ref(db, `presence/${myClientId}`);
import { onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
set(myPresenceRef, true);
onDisconnect(myPresenceRef).remove();

onValue(ref(db, 'presence'), snap => {
  const count = snap.exists() ? Object.keys(snap.val()).length : 0;
  document.getElementById('participantCount').textContent = `${count}人参加中`;
});

// 質問
onValue(ref(db, 'question'), snap => {
  questionState = snap.val() || {};
  if (currentTab === 'question') renderQuestion();
});

// ゲーム
onValue(ref(db, 'game'), snap => {
  gameState = snap.val() || {};
  if (currentTab === 'game') renderGame();
});

// メッセージ
onValue(ref(db, 'messages'), snap => {
  messages = [];
  if (snap.exists()) {
    snap.forEach(child => {
      messages.push({ id: child.key, ...child.val() });
    });
    messages.sort((a, b) => (b.ts || 0) - (a.ts || 0));
  }
  if (currentTab === 'message') renderMessages();
});

// ============================================================
// タブ切替
// ============================================================
window.switchTab = function(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  if (currentTab === 'question') renderQuestion();
  else if (currentTab === 'game') renderGame();
  else if (currentTab === 'message') renderMessages();
}

// ============================================================
// 質問タブ
// ============================================================
function renderQuestion() {
  const el = document.getElementById('mainContent');
  const q  = questionState;

  if (!q || !q.active || !q.text) {
    el.innerHTML = `
      <div class="waiting fade-in">
        <div class="waiting-icon">⏳</div>
        <div class="waiting-text">ホストが質問を準備中です<br>もうちょっと待ってね！</div>
      </div>`;
    return;
  }

  // 票数集計
  const votes  = q.votes || {};
  const total  = Object.values(votes).reduce((s, v) => s + v, 0);
  const myAns  = myVote;
  const showed = myAns !== null && myAns !== undefined;

  const choices = (q.choices || []).map((text, i) => {
    const count = votes[i] || 0;
    const pct   = total > 0 ? Math.round(count / total * 100) : 0;
    const isMine = String(myAns) === String(i);
    return `
      <button
        class="choice-btn ${showed ? 'voted' : ''} ${isMine ? 'selected' : ''}"
        style="--pct:${pct}%"
        onclick="castVote(${i})"
        ${showed ? 'disabled' : ''}>
        <span class="choice-text">${text}</span>
        <span class="choice-meta">
          ${showed ? `<span class="choice-pct">${pct}%</span><span class="choice-count">${count}人</span>` : ''}
          ${isMine ? '<span class="choice-check">✓</span>' : ''}
        </span>
      </button>`;
  }).join('');

  el.innerHTML = `
    <div class="card fade-in">
      <div class="card-label">❓ 質問</div>
      <div class="card-title">${q.text}</div>
      <div class="choices">${choices}</div>
      ${showed ? `<div style="font-size:0.75rem;color:var(--sub);margin-top:12px;text-align:center;">合計 ${total} 票</div>` : ''}
    </div>`;
}

window.castVote = async function(choiceIndex) {
  if (myVote !== null && myVote !== undefined) return;
  myVote = choiceIndex;
  await runTransaction(ref(db, `question/votes/${choiceIndex}`), cur => (cur || 0) + 1);
  renderQuestion();
}

// ============================================================
// ゲームタブ
// ============================================================
function renderGame() {
  const el = document.getElementById('mainContent');
  const g  = gameState;

  if (!g || !g.type || g.type === 'idle') {
    el.innerHTML = `
      <div class="waiting fade-in">
        <div class="waiting-icon">🎮</div>
        <div class="waiting-text">ホストがゲームを<br>準備中です！</div>
      </div>`;
    return;
  }

  if (g.type === 'buzz') renderBuzzGame(el, g);
  else if (g.type === 'timing') renderTimingGame(el, g);
}

function renderBuzzGame(el, g) {
  if (g.status === 'waiting') {
    myBuzzed = false;
    el.innerHTML = `
      <div class="card teal fade-in">
        <div class="card-label">🔴 早押しゲーム</div>
        <div class="card-title">準備はいい？</div>
        <div class="game-area">
          <div class="game-status">ホストが開始したらボタンを押せ！</div>
          <button class="buzz-btn" disabled>待機中...</button>
        </div>
      </div>`;
  } else if (g.status === 'ready') {
    el.innerHTML = `
      <div class="card teal fade-in">
        <div class="card-label">🔴 早押しゲーム</div>
        <div class="card-title">今すぐ押せ！！</div>
        <div class="game-area">
          <button class="buzz-btn" id="buzzBtn" onclick="doBuzz()">押す！</button>
        </div>
      </div>`;
  } else if (g.status === 'done') {
    const won = g.winner === myClientId;
    el.innerHTML = `
      <div class="card teal fade-in">
        <div class="card-label">🔴 早押しゲーム</div>
        <div class="card-title">結果発表！</div>
        <div class="game-area">
          <button class="buzz-btn ${won ? 'winner' : 'loser'}" disabled>
            ${won ? '🏆' : '😢'}
          </button>
          <div class="result-banner ${won ? 'win' : 'lose'}">
            ${won ? '🎉 あなたが一番乗り！' : '惜しかった…次こそ！'}
          </div>
        </div>
      </div>`;
    if (won) launchConfetti();
  }
}

window.doBuzz = async function() {
  if (myBuzzed) return;
  const snap = await get(ref(db, 'game/status'));
  if (snap.val() !== 'ready') return;
  myBuzzed = true;
  const updates = {};
  updates['game/status'] = 'done';
  updates['game/winner'] = myClientId;
  updates['game/winnerTime'] = serverTimestamp();
  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({ update }) => {
    update(ref(db), updates);
  });
}

function renderTimingGame(el, g) {
  if (g.status === 'waiting') {
    myTimed = false;
    if (timingRAF) { cancelAnimationFrame(timingRAF); timingRAF = null; }
    el.innerHTML = `
      <div class="card blue fade-in">
        <div class="card-label">⏱ タイミングゲーム</div>
        <div class="card-title">バーが中央に来たら押せ！</div>
        <div class="timing-area">
          <div class="game-status">ホストが開始するまで待機</div>
          <button class="timing-tap-btn" disabled>待機中</button>
        </div>
      </div>`;
  } else if (g.status === 'ready') {
    el.innerHTML = `
      <div class="card blue fade-in">
        <div class="card-label">⏱ タイミングゲーム</div>
        <div class="card-title">🎯 中央でタップ！</div>
        <div class="timing-area">
          <div class="timing-target">ゾーン内でタップしよう</div>
          <div class="timing-bar-wrap" id="timingBarWrap">
            <div class="timing-zone" id="timingZone"></div>
            <div class="timing-bar" id="timingBar"></div>
          </div>
          <button class="timing-tap-btn" id="timingBtn" onclick="doTiming()">タップ！</button>
          <div class="timing-score" id="timingScore"></div>
        </div>
      </div>`;
    startTimingAnimation();
  } else if (g.status === 'done') {
    if (timingRAF) { cancelAnimationFrame(timingRAF); timingRAF = null; }
    const myResult = (g.results || {})[myClientId];
    const score = myResult ? myResult.score : null;
    const label = score === null ? '未回答' :
                  score >= 90 ? '🏆 神！' :
                  score >= 70 ? '✨ 惜しい！' :
                  score >= 50 ? '👍 まあまあ' : '💀 ズレすぎ';
    const results = Object.entries(g.results || {})
      .sort((a,b) => (b[1].score||0) - (a[1].score||0))
      .map(([id, r], i) => `<div style="font-size:0.85rem;color:${id===myClientId?'var(--accent2)':'var(--sub)'}">
        ${i+1}位: ${id===myClientId?'あなた':'他の人'} — ${r.score}点
      </div>`).join('');
    el.innerHTML = `
      <div class="card blue fade-in">
        <div class="card-label">⏱ タイミングゲーム</div>
        <div class="card-title">結果！</div>
        <div class="timing-area">
          <div class="result-banner ${score >= 70 ? 'win' : 'lose'}">
            ${score !== null ? `あなた: ${score}点 ${label}` : '未回答'}
          </div>
          <div style="width:100%;display:flex;flex-direction:column;gap:4px;">${results}</div>
        </div>
      </div>`;
    if (score >= 90) launchConfetti();
  }
}

function startTimingAnimation() {
  const wrap = document.getElementById('timingBarWrap');
  const bar  = document.getElementById('timingBar');
  const zone = document.getElementById('timingZone');
  if (!wrap || !bar) return;
  const wrapW = wrap.offsetWidth;
  const zoneW = wrapW * 0.14;
  const zoneL = (wrapW - zoneW) / 2;
  zone.style.left  = zoneL + 'px';
  zone.style.width = zoneW + 'px';
  timingPos = 0; timingDir = 1;
  let last = null;
  function step(ts) {
    if (!last) last = ts;
    const dt = ts - last; last = ts;
    timingPos += timingDir * (dt / 6);
    if (timingPos >= wrapW - 4) { timingPos = wrapW - 4; timingDir = -1; }
    if (timingPos <= 0)          { timingPos = 0;         timingDir = 1; }
    bar.style.left = timingPos + 'px';
    timingRAF = requestAnimationFrame(step);
  }
  timingRAF = requestAnimationFrame(step);
}

window.doTiming = async function() {
  if (myTimed) return;
  myTimed = true;
  if (timingRAF) { cancelAnimationFrame(timingRAF); timingRAF = null; }
  const wrap = document.getElementById('timingBarWrap');
  if (!wrap) return;
  const wrapW = wrap.offsetWidth;
  const zoneL = (wrapW - wrapW * 0.14) / 2;
  const zoneR = zoneL + wrapW * 0.14;
  const inZone = timingPos >= zoneL && timingPos <= zoneR;
  const dist   = Math.abs(timingPos - wrapW / 2) / (wrapW / 2);
  const score  = inZone ? Math.round((1 - dist * 2) * 100) : Math.round(Math.max(0, 40 - dist * 40));

  document.getElementById('timingBtn').disabled = true;
  document.getElementById('timingScore').textContent = `あなたのスコア: ${score}点`;

  import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js").then(({ update }) => {
    update(ref(db), { [`game/results/${myClientId}`]: { score, ts: Date.now() } });
  });
}

// ============================================================
// メッセージタブ
// ============================================================
function renderMessages() {
  const el = document.getElementById('mainContent');
  const msgHtml = messages.map(m => {
    const t = m.ts ? new Date(m.ts).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' }) : '';
    return `<div class="msg-item">${escHtml(m.text)}<div class="msg-time">${t}</div></div>`;
  }).join('');

  el.innerHTML = `
    <div class="card blue fade-in">
      <div class="card-label">💬 匿名メッセージ</div>
      <div class="msg-input-area">
        <textarea class="msg-textarea" id="msgInput" placeholder="みんなへのメッセージ（匿名）" rows="2"
          oninput="autoResize(this)" onkeydown="msgKeydown(event)"></textarea>
        <button class="msg-send-btn" onclick="sendMessage()">➤</button>
      </div>
      <div class="msg-list" id="msgList">${msgHtml || '<div style="color:var(--sub);font-size:0.85rem;text-align:center;padding:16px;">まだメッセージがありません</div>'}</div>
    </div>`;
}

window.sendMessage = async function() {
  const input = document.getElementById('msgInput');
  const text  = input ? input.value.trim() : '';
  if (!text) return;
  input.value = '';
  input.style.height = '';
  await push(ref(db, 'messages'), { text, ts: serverTimestamp() });
}

window.msgKeydown = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ============================================================
// ユーティリティ
// ============================================================
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function launchConfetti() {
  const wrap  = document.getElementById('confettiWrap');
  const colors = ['#ff6b35','#ffd166','#06d6a0','#4895ef','#ff9ff3','#ffffff'];
  wrap.innerHTML = '';
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = `left:${Math.random()*100}%;top:-10px;background:${colors[i%colors.length]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      --d:${1.2+Math.random()*1.2}s;--dl:${Math.random()*0.4}s`;
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 2500);
}

// 初期描画
render();
</script>
