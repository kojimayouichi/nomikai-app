<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍺 おつかれさまでした</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Opti:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');
:root{--bg:#0f0f1a;--text:#f0eaff;--sub:#9990bb;--accent:#ff6b35;--accent2:#ffd166;--teal:#06d6a0}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Zen Kaku Gothic New',sans-serif;color:var(--text);min-height:100svh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(255,107,53,.1) 0%,transparent 60%);pointer-events:none}
.container{position:relative;z-index:1;text-align:center;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:24px;max-width:400px}
.icon{font-size:5rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.title{font-family:'Kaisei Opti',serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3}
.sub{font-size:1rem;color:var(--sub);line-height:1.8}
.divider{width:60px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px}
.msg{font-size:1.1rem;color:var(--text);line-height:1.8;font-weight:700}
.close-btn{padding:16px 40px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--accent),#e05520);color:white;font-family:'Zen Kaku Gothic New',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,.3);transition:all .2s;margin-top:8px}
.close-btn:active{transform:scale(.97)}
/* confetti */
.cf-wrap{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cf{position:absolute;opacity:0;animation:cfFall var(--d) ease-in var(--dl) forwards}
@keyframes cfFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
</style>
</head>
<body>
<div class="cf-wrap" id="cfWrap"></div>
<div class="container">
  <div class="icon">🍺</div>
  <div class="title">おつかれさまでした！</div>
  <div class="divider"></div>
  <div class="msg">今日も楽しい時間を<br>ありがとうございました！</div>
  <div class="sub">また一緒に飲みましょう 🥂</div>
  <button class="close-btn" onclick="tryClose()">画面を閉じる</button>
</div>

<script>
// confetti
const wrap  = document.getElementById('cfWrap');
const cols  = ['#ff6b35','#ffd166','#06d6a0','#4895ef','#ff9ff3','#ffffff'];
for (let i = 0; i < 60; i++) {
  const el = document.createElement('div');
  el.className = 'cf';
  el.style.cssText = `
    left:${Math.random()*100}%;
    top:-10px;
    background:${cols[i%cols.length]};
    border-radius:${Math.random()>.5?'50%':'3px'};
    width:${6+Math.random()*8}px;
    height:${6+Math.random()*8}px;
    --d:${1.5+Math.random()*2}s;
    --dl:${Math.random()*1.5}s
  `;
  wrap.appendChild(el);
}

function tryClose() {
  window.close();
  // 閉じられなかった場合は何もしない（ページはそのまま）
}
</script>
</body>
</html>
